name: Ingest FAERS data

on:
  workflow_dispatch:          # manual "Run workflow" button
  push:
    branches: [main]          # merge/push to main -> triggers the job
  schedule:
    - cron: "0 6 1 * *"       # also monthly auto-refresh

permissions:
  contents: write             # so the action can commit the zip back

jobs:
  ingest:
    runs-on: ubuntu-latest    # clean network -> no corporate SSL issues

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Download FAERS data
        env:
          OPENFDA_API_KEY: ${{ secrets.OPENFDA_API_KEY }}
        run: python 01_ingest_fears.py

      - name: Commit data to repo
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f data/raw/faers/*.json.zip
          git diff --staged --quiet || git commit -m "Update FAERS data [skip ci]"
          git push
